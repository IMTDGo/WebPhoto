<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — WEBPHOTO</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Geist:wght@400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-high": "#2a2a2a", "on-background": "#e5e2e1",
            "surface-tint": "#e9c349", "surface-container-low": "#1c1b1b",
            "primary-container": "#d4af37", "primary": "#f2ca50",
            "surface-bright": "#3a3939", "on-primary": "#3c2f00",
            "surface-container": "#201f1f", "on-surface-variant": "#d0c5af",
            "surface-container-lowest": "#0e0e0e", "outline-variant": "#4d4635",
            "on-surface": "#e5e2e1", "surface-container-highest": "#353534",
            "surface": "#131313", "background": "#131313",
            "surface-variant": "#353534", "outline": "#99907c",
            "primary-fixed": "#ffe088", "error": "#ffb4ab"
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
          spacing: { "margin-page": "64px", "container-padding": "32px", "gutter": "24px", "margin-mobile": "24px", "unit": "8px", "stack-gap": "16px" },
          fontFamily: { "headline-xl": ["Playfair Display"], "headline-lg": ["Playfair Display"], "label-sm": ["Geist"], "label-xs": ["Geist"], "body-lg": ["DM Sans"], "body-md": ["DM Sans"] },
          fontSize: {
            "headline-xl": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
            "headline-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }],
            "headline-lg-mobile": ["28px", { lineHeight: "1.2", fontWeight: "600" }],
            "label-sm": ["12px", { lineHeight: "1.0", letterSpacing: "0.08em", fontWeight: "500" }],
            "label-xs": ["10px", { lineHeight: "1.0", letterSpacing: "0.1em", fontWeight: "600" }],
            "body-lg": ["18px", { lineHeight: "1.6", letterSpacing: "0.01em", fontWeight: "400" }],
            "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }]
          }
        }
      }
    }
  </script>
  <style>
    body { text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
    .glass-panel { background: rgba(42,42,42,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(153,144,124,0.1); box-shadow: 0px 20px 40px rgba(0,0,0,0.4); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    .spinner { display:inline-block;width:14px;height:14px;border:2px solid #f2ca50;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:4px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert-box { border-radius: 0.5rem; padding: 0.65rem 1rem; font-size: 0.875rem; display: none; }
    .alert-success { background: rgba(26,58,42,0.8); border: 1px solid #22c55e; color: #4ade80; }
    .alert-error   { background: rgba(58,26,26,0.8); border: 1px solid #ef4444; color: #f87171; }
    .alert-info    { background: rgba(26,42,58,0.8); border: 1px solid #60a5fa; color: #93c5fd; }
    .otp-input { letter-spacing: 0.5rem; text-align: center; font-size: 1.8rem; font-weight: 700; }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-page relative overflow-x-hidden selection:bg-primary selection:text-on-primary">

  <!-- Atmospheric background -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden flex items-center justify-center">
    <div class="absolute w-[80vw] h-[80vw] max-w-[800px] max-h-[800px] bg-primary/5 rounded-full blur-[100px] opacity-60 mix-blend-screen -translate-x-1/4 -translate-y-1/4"></div>
    <div class="absolute w-[60vw] h-[60vw] max-w-[600px] max-h-[600px] bg-surface-bright/20 rounded-full blur-[120px] opacity-40 mix-blend-screen translate-x-1/3 translate-y-1/3"></div>
  </div>
  <div class="absolute inset-0 pointer-events-none opacity-[0.02] bg-[radial-gradient(#e5e2e1_1px,transparent_1px)] [background-size:24px_24px]"></div>

  <main class="w-full max-w-[480px] z-10 relative">
    <!-- Brand -->
    <div class="text-center mb-8">
      <a href="./index.html" class="font-headline-lg text-headline-lg tracking-tighter text-primary hover:text-primary-fixed transition-colors duration-250">WEBPHOTO</a>
    </div>

    <!-- Glass Card -->
    <div class="glass-panel rounded-xl p-container-padding md:p-12 transition-all duration-250 ease-out hover:bg-surface-container-high/50 hover:border-outline/20">

      <!-- ── STEP 1: Fill in details ── -->
      <div id="step1">
        <div class="text-center mb-8">
          <h2 class="font-headline-xl text-[30px] md:text-[36px] text-on-surface tracking-tight mb-2" style="font-family:'Playfair Display'">Create Your Account</h2>
          <p class="font-body-md text-body-md text-on-surface-variant">建立您的 WEBPHOTO 帳號</p>
        </div>

        <div id="alertBox1" class="alert-box mb-6"></div>

        <form id="step1Form" autocomplete="on" novalidate class="flex flex-col gap-8">
          <!-- Username -->
          <div class="flex flex-col gap-2 group relative">
            <label class="font-label-sm text-label-sm text-on-surface-variant transition-colors duration-250 group-focus-within:text-primary uppercase tracking-widest" for="s1Username">Username</label>
            <div class="relative">
              <input id="s1Username" name="username" type="text" autocomplete="username" required
                class="w-full bg-surface-variant/10 border-b border-outline-variant/30 text-on-surface font-body-lg text-body-lg py-3 px-1 focus:outline-none focus:border-primary focus:bg-surface-variant/20 transition-all duration-250 ease-out"
                placeholder=" " />
            </div>
            <p class="font-label-xs text-label-xs text-on-surface-variant/50">英數字或底線，3–30 字元</p>
          </div>

          <!-- Password -->
          <div class="flex flex-col gap-2 group relative">
            <label class="font-label-sm text-label-sm text-on-surface-variant transition-colors duration-250 group-focus-within:text-primary uppercase tracking-widest" for="s1Password">Password</label>
            <div class="relative">
              <input id="s1Password" name="password" type="password" autocomplete="new-password" required
                class="w-full bg-surface-variant/10 border-b border-outline-variant/30 text-on-surface font-body-lg text-body-lg py-3 px-1 focus:outline-none focus:border-primary focus:bg-surface-variant/20 transition-all duration-250 ease-out"
                placeholder=" " />
            </div>
            <p class="font-label-xs text-label-xs text-on-surface-variant/50">至少 8 個字元</p>
          </div>

          <!-- Confirm Password -->
          <div class="flex flex-col gap-2 group relative">
            <label class="font-label-sm text-label-sm text-on-surface-variant transition-colors duration-250 group-focus-within:text-primary uppercase tracking-widest" for="s1Confirm">Confirm Password</label>
            <div class="relative">
              <input id="s1Confirm" name="confirm" type="password" autocomplete="new-password" required
                class="w-full bg-surface-variant/10 border-b border-outline-variant/30 text-on-surface font-body-lg text-body-lg py-3 px-1 focus:outline-none focus:border-primary focus:bg-surface-variant/20 transition-all duration-250 ease-out"
                placeholder=" " />
            </div>
          </div>

          <!-- Email -->
          <div class="flex flex-col gap-2 group relative">
            <label class="font-label-sm text-label-sm text-on-surface-variant transition-colors duration-250 group-focus-within:text-primary uppercase tracking-widest" for="s1Email">Gmail Address</label>
            <div class="relative">
              <input id="s1Email" name="email" type="email" autocomplete="email" required
                class="w-full bg-surface-variant/10 border-b border-outline-variant/30 text-on-surface font-body-lg text-body-lg py-3 px-1 pr-8 focus:outline-none focus:border-primary focus:bg-surface-variant/20 transition-all duration-250 ease-out"
                placeholder=" " />
              <span class="absolute right-2 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none material-symbols-outlined text-[18px]">mail</span>
            </div>
            <p class="font-label-xs text-label-xs text-on-surface-variant/50">✉ 系統將寄送 6 位數驗證碼，10 分鐘內有效</p>
          </div>

          <!-- Actions -->
          <div class="flex flex-col gap-4 mt-2">
            <button type="submit" id="btnSendOtp"
              class="w-full bg-primary text-on-primary font-label-sm text-label-sm py-4 rounded transition-all duration-250 ease-out hover:bg-primary-fixed hover:scale-[0.98] active:scale-[0.95] flex items-center justify-center gap-2 uppercase tracking-widest">
              Send OTP
              <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
            </button>
            <button type="button" id="btnCancel1"
              class="w-full bg-transparent border border-outline/20 text-on-surface font-label-sm text-label-sm py-4 rounded transition-all duration-250 ease-out hover:bg-surface-variant/30 hover:border-outline/50 hover:text-primary active:scale-[0.98] uppercase tracking-widest">
              Cancel
            </button>
          </div>
        </form>

        <div class="mt-8 text-center">
          <p class="font-body-md text-body-md text-on-surface-variant">
            Already have an account?
            <a href="./login.html" class="text-primary hover:text-primary-fixed transition-colors duration-250 underline decoration-primary/30 underline-offset-4 hover:decoration-primary ml-1">Log in</a>
          </p>
        </div>
      </div>

      <!-- ── STEP 2: OTP verification ── -->
      <div id="step2" class="hidden">
        <div class="text-center mb-8">
          <span class="material-symbols-outlined text-primary text-[48px] mb-3 block">mark_email_unread</span>
          <h2 class="font-headline-xl text-[30px] md:text-[36px] text-on-surface tracking-tight mb-2" style="font-family:'Playfair Display'">Verify Email</h2>
          <p class="font-body-md text-body-md text-on-surface-variant mb-1">驗證碼已寄送至</p>
          <p class="font-label-sm text-label-sm text-primary tracking-widest" id="displayEmail"></p>
        </div>

        <div id="alertBox2" class="alert-box mb-6"></div>

        <form id="step2Form" novalidate class="flex flex-col gap-8">
          <div class="flex flex-col gap-2 group">
            <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Verification Code</label>
            <input id="s2Otp" type="text" inputmode="numeric" maxlength="6" required
              class="w-full bg-surface-variant/10 border-b border-outline-variant/30 text-on-surface py-3 px-1 focus:outline-none focus:border-primary focus:bg-surface-variant/20 transition-all duration-250 ease-out otp-input"
              placeholder="______" />
            <p class="font-label-xs text-label-xs text-on-surface-variant/50 text-center">輸入 6 位數字驗證碼</p>
          </div>

          <div class="text-center">
            <span class="font-body-md text-body-md text-on-surface-variant">沒收到？</span>
            <button type="button" id="btnResend" class="text-primary hover:text-primary-fixed font-label-sm text-label-sm ml-2 transition-colors duration-250 border-b border-transparent hover:border-primary">重新發送</button>
            <span id="resendCooldown" class="font-label-xs text-label-xs text-on-surface-variant/40 ml-1 hidden"></span>
          </div>

          <div class="flex flex-col gap-3">
            <button type="submit" id="btnVerify"
              class="w-full bg-primary text-on-primary font-label-sm text-label-sm py-4 rounded transition-all duration-250 ease-out hover:bg-primary-fixed hover:scale-[0.98] active:scale-[0.95] flex items-center justify-center gap-2 uppercase tracking-widest">
              Verify
              <span class="material-symbols-outlined text-[16px]">verified</span>
            </button>
            <button type="button" id="btnBack2"
              class="w-full bg-transparent border border-outline/20 text-on-surface font-label-sm text-label-sm py-4 rounded transition-all duration-250 ease-out hover:bg-surface-variant/30 hover:border-outline/50 active:scale-[0.98] uppercase tracking-widest">
              Back
            </button>
          </div>
        </form>
      </div>

    </div>
  </main>

  <script>
    const BASE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? `${window.location.protocol}//${window.location.host}`
      : 'https://webphoto-lidl.onrender.com';

    // ── State ──
    let currentEmail    = '';
    let currentUsername = '';
    let currentPassword = '';

    // ── Helpers ──
    function showAlert(boxId, type, msg) {
      const el = document.getElementById(boxId);
      el.className = 'alert-box ' + (
        type === 'success' ? 'alert-success' :
        type === 'info'    ? 'alert-info'    : 'alert-error'
      );
      el.style.display = 'block';
      el.textContent   = msg;
    }
    function hideAlert(boxId) {
      document.getElementById(boxId).style.display = 'none';
    }
    function showStep(n) {
      document.getElementById('step1').classList.toggle('hidden', n !== 1);
      document.getElementById('step2').classList.toggle('hidden', n !== 2);
    }

    // ── Cancel / Back ──
    document.getElementById('btnCancel1').addEventListener('click', () => {
      if (history.length > 1) history.back();
      else window.location.href = './login.html';
    });
    document.getElementById('btnBack2').addEventListener('click', () => {
      hideAlert('alertBox2');
      showStep(1);
    });

    // ── STEP 1: Send OTP ──
    document.getElementById('step1Form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert('alertBox1');

      const username = document.getElementById('s1Username').value.trim();
      const password = document.getElementById('s1Password').value;
      const confirm  = document.getElementById('s1Confirm').value;
      const email    = document.getElementById('s1Email').value.trim();

      if (!username || !password || !confirm || !email) {
        showAlert('alertBox1', 'error', '請填寫所有欄位');
        return;
      }
      if (!/^[a-zA-Z0-9_]{3,30}$/.test(username)) {
        showAlert('alertBox1', 'error', '帳號只能使用英數字和底線，長度 3–30 字元');
        return;
      }
      if (password.length < 8) {
        showAlert('alertBox1', 'error', '密碼至少需要 8 個字元');
        return;
      }
      if (password !== confirm) {
        showAlert('alertBox1', 'error', '兩次密碼輸入不一致');
        return;
      }
      if (!/^[^\s@]+@gmail\.com$/i.test(email)) {
        showAlert('alertBox1', 'error', '請輸入有效的 Gmail 地址（需以 @gmail.com 結尾）');
        return;
      }

      const btn = document.getElementById('btnSendOtp');
      btn.disabled    = true;
      btn.innerHTML   = '<span class="spinner"></span>寄送中...';

      try {
        const res = await fetch(`${BASE_URL}/register/send-otp`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password, email })
        });
        const data = await res.json();
        if (data.ok) {
          currentEmail    = email;
          currentUsername = username;
          currentPassword = password;
          document.getElementById('displayEmail').textContent = email;
          showStep(2);
          startResendCooldown();
        } else {
          showAlert('alertBox1', 'error', '✘ ' + data.message);
        }
      } catch (err) {
        showAlert('alertBox1', 'error', '✘ 連線失敗，請稍後再試');
      } finally {
        btn.disabled  = false;
        btn.innerHTML = 'Send OTP';
      }
    });

    // ── STEP 2: Verify OTP ──
    document.getElementById('step2Form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert('alertBox2');

      const otp = document.getElementById('s2Otp').value.trim();
      if (!/^\d{6}$/.test(otp)) {
        showAlert('alertBox2', 'error', '請輸入 6 位數驗證碼');
        return;
      }

      const btn = document.getElementById('btnVerify');
      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span>驗證中...';

      try {
        const res = await fetch(`${BASE_URL}/register/verify`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email: currentEmail, otp })
        });
        const data = await res.json();
        if (data.ok) {
          showAlert('alertBox2', 'success', '✔ ' + data.message);
          setTimeout(() => window.location.replace('./login.html'), 1500);
        } else {
          showAlert('alertBox2', 'error', '✘ ' + data.message);
        }
      } catch (err) {
        showAlert('alertBox2', 'error', '✘ 連線失敗，請稍後再試');
      } finally {
        btn.disabled  = false;
        btn.innerHTML = 'Verify';
      }
    });

    // ── Resend cooldown ──
    let resendTimer = null;
    function startResendCooldown(seconds = 60) {
      const btn = document.getElementById('btnResend');
      const cd  = document.getElementById('resendCooldown');
      btn.disabled = true;
      btn.classList.add('opacity-40', 'cursor-not-allowed');
      cd.classList.remove('hidden');
      let remaining = seconds;
      cd.textContent = `(${remaining}s)`;
      if (resendTimer) clearInterval(resendTimer);
      resendTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(resendTimer);
          btn.disabled = false;
          btn.classList.remove('opacity-40', 'cursor-not-allowed');
          cd.classList.add('hidden');
        } else {
          cd.textContent = `(${remaining}s)`;
        }
      }, 1000);
    }

    document.getElementById('btnResend').addEventListener('click', async () => {
      hideAlert('alertBox2');
      try {
        const res = await fetch(`${BASE_URL}/register/send-otp`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username: currentUsername, password: currentPassword, email: currentEmail })
        });
        const data = await res.json();
        if (data.ok) {
          showAlert('alertBox2', 'info', '✉ 驗證碼已重新寄出');
          startResendCooldown();
        } else {
          showAlert('alertBox2', 'error', '✘ ' + data.message);
        }
      } catch (err) {
        showAlert('alertBox2', 'error', '✘ 連線失敗');
      }
    });
  </script>

</body>
</html>
