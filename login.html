<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - WebPhoto</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/camera.css" />
  <style>
    body {
      background: radial-gradient(ellipse at 50% 40%, #1e2a3a 0%, #0d1117 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Modal card */
    .login-card {
      background: #1c2333;
      border-radius: 1.25rem;
      padding: 2.5rem 2.25rem 2rem;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.55);
    }

    /* Input fields — match screenshot dark style */
    .login-input {
      width: 100%;
      background: #252d3d;
      border: 1.5px solid transparent;
      border-radius: 0.625rem;
      color: #e0e6f0;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.18s;
    }
    .login-input:focus {
      border-color: #3b82f6;
    }
    .login-input::placeholder {
      color: #6b7a8d;
    }

    /* Checkbox accent */
    .login-checkbox {
      accent-color: #3b82f6;
      width: 1.1rem;
      height: 1.1rem;
      cursor: pointer;
    }

    /* Buttons */
    .btn-cancel {
      border: 1.5px solid #4b5563;
      border-radius: 9999px;
      padding: 0.6rem 1.6rem;
      background: transparent;
      color: #cbd5e1;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-cancel:hover {
      background: #252d3d;
      border-color: #6b7280;
    }

    .btn-login {
      border: none;
      border-radius: 9999px;
      padding: 0.65rem 1.8rem;
      background: #f1f5f9;
      color: #1e40af;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-login:hover {
      background: #e2e8f0;
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Alert box */
    .alert-box {
      border-radius: 0.5rem;
      padding: 0.65rem 1rem;
      font-size: 0.875rem;
      display: none;
    }
    .alert-success {
      background: #1a3a2a;
      border: 1px solid #22c55e;
      color: #4ade80;
    }
    .alert-error {
      background: #3a1a1a;
      border: 1px solid #ef4444;
      color: #f87171;
    }
    .alert-info {
      background: #1a2a3a;
      border: 1px solid #60a5fa;
      color: #93c5fd;
    }

    /* Loading spinner inside button */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #3b82f6;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Camera Test ──────────────────────────────────────────────────────── */
    .btn-camera-test {
      background: none;
      border: 1px dashed #374151;
      border-radius: 9999px;
      padding: 0.35rem 1.1rem;
      color: #4b5563;
      font-size: 0.75rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.03em;
    }
    .btn-camera-test:hover { color: #9ca3af; border-color: #6b7280; }

    #camTestOverlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #camTestOverlay.open { display: flex; }

    .cam-card {
      background: #1c2333;
      border-radius: 1.25rem;
      padding: 1.5rem;
      width: 100%;
      max-width: 540px;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.65);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      position: relative;
    }
    .cam-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .cam-header h2 { color: #e0e6f0; font-size: 1rem; font-weight: 600; margin: 0; }
    .cam-close-btn {
      background: none; border: none;
      color: #6b7280; font-size: 1.3rem;
      cursor: pointer; line-height: 1; padding: 0.2rem 0.4rem;
      border-radius: 0.25rem;
    }
    .cam-close-btn:hover { color: #e0e6f0; background: #252d3d; }

    /* #camTestVideo styling is now handled by css/camera.css (.cam-viewfinder video) */
    .cam-status {
      color: #94a3b8; font-size: 0.85rem;
      text-align: center; min-height: 1.2em;
    }
    .cam-dots {
      display: none; gap: 0.75rem;
      justify-content: center; align-items: center;
    }
    .cam-dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: #374151; transition: background 0.25s;
    }
    .cam-dot.active { background: #60a5fa; box-shadow: 0 0 6px #60a5fa88; }
    .cam-dot.done   { background: #22c55e; }

    .cam-results {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0.6rem;
    }
    .cam-thumb-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
    }
    .cam-thumb {
      width: 100%; height: 80px; object-fit: cover;
      border-radius: 0.5rem; border: 1px solid #374151;
      display: block;
    }
    .cam-thumb-label {
      color: #94a3b8; font-size: 0.7rem; text-align: center;
    }
    .cam-log {
      font-size: 0.78rem; color: #94a3b8;
      display: flex; flex-direction: column; gap: 0.25rem;
    }
    .cam-log-link {
      color: #60a5fa; text-decoration: underline; margin-left: 0.4rem;
    }
    .cam-btns {
      display: flex; justify-content: center; gap: 0.75rem; flex-wrap: wrap;
    }
    .btn-cam-start {
      border: none; border-radius: 9999px;
      padding: 0.62rem 1.8rem;
      background: #3b82f6; color: #fff;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-cam-start:hover { background: #2563eb; }
    .btn-cam-start:disabled { opacity: 0.5; cursor: not-allowed; }
    .cam-hdr-badge {
      display: inline-block;
      background: #7c3aed; color: #f5f3ff;
      font-size: 0.65rem; font-weight: 700;
      border-radius: 0.25rem; padding: 0.1rem 0.35rem;
      letter-spacing: 0.05em; vertical-align: middle;
      margin-left: 0.35rem;
    }
    .cam-info-row {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; font-size: 0.75rem; color: #6b7280;
    }

    /* Rename dialog */
    .cam-rename-overlay {
      position: absolute; inset: 0;
      background: rgba(13,17,23,0.9);
      border-radius: 1.25rem;
      z-index: 5;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .cam-rename-box {
      background: #252d3d;
      border-radius: 1rem;
      padding: 1.5rem;
      width: 88%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .cam-rename-title {
      color: #e0e6f0;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .cam-rename-input {
      width: 100%;
      background: #1c2333;
      border: 1.5px solid #374151;
      border-radius: 0.5rem;
      color: #e0e6f0;
      font-size: 0.9rem;
      padding: 0.65rem 0.85rem;
      outline: none;
      transition: border-color 0.18s;
      box-sizing: border-box;
    }
    .cam-rename-input:focus { border-color: #3b82f6; }
    .cam-rename-hint {
      color: #6b7280;
      font-size: 0.72rem;
      line-height: 1.5;
    }
    .btn-rename-ok {
      border: none;
      border-radius: 9999px;
      padding: 0.65rem 1.4rem;
      background: #3b82f6;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }
    .btn-rename-ok:hover { background: #2563eb; }

    /* Debug log panel */
    .cam-debug-panel {
      background: #0a0e17;
      border: 1px solid #1e293b;
      border-radius: 0.5rem;
      padding: 0.6rem 0.75rem;
      max-height: 180px;
      overflow-y: auto;
      display: none;
    }
    .cam-debug-title {
      color: #4b5563; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.05em; margin-bottom: 0.3rem;
    }
    .cam-debug-log {
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      line-height: 1.65;
      color: #64748b;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .cam-debug-log .ok  { color: #22c55e; }
    .cam-debug-log .err { color: #f87171; }
    .cam-debug-log .inf { color: #60a5fa; }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- Title -->
    <h1 class="text-center text-white font-bold text-2xl mb-6">Sign in</h1>

    <!-- Alert area -->
    <div id="alertBox" class="alert-box mb-4"></div>

    <!-- Form -->
    <form id="loginForm" autocomplete="on" novalidate>

      <!-- Username -->
      <div class="mb-3">
        <input
          id="username"
          name="username"
          type="text"
          class="login-input"
          placeholder="Username"
          autocomplete="username"
          required
        />
      </div>

      <!-- Password -->
      <div class="mb-4">
        <input
          id="password"
          name="password"
          type="password"
          class="login-input"
          placeholder="Password"
          autocomplete="current-password"
          required
        />
      </div>

      <!-- Remember Me -->
      <div class="flex items-center gap-2 mb-5">
        <input type="checkbox" id="rememberMe" class="login-checkbox" checked />
        <label for="rememberMe" class="text-sm text-slate-300 cursor-pointer select-none">
          Remember Me <span class="text-slate-500">(Do not use on public computers)</span>
        </label>
      </div>

      <!-- Sign up link -->
      <div class="text-center mb-6">
        <span class="text-sm text-slate-400">Don't have an account yet? </span>
        <a href="./signup.html" class="text-sm text-blue-400 hover:underline">Sign up now.</a>
      </div>

      <!-- Buttons -->
      <div class="flex justify-end gap-3">
        <button type="button" class="btn-cancel" id="btnCancel">Cancel</button>
        <button type="submit" class="btn-login" id="btnLogin">Log In</button>
      </div>

    </form>

    <!-- Camera test button -->
    <div class="text-center mt-5 pt-4" style="border-top: 1px solid #1e2a3a;">
      <button type="button" id="btnCameraTest" class="btn-camera-test">📷 Camera Test</button>
    </div>

  </div>

  <!-- ── Camera Test Overlay ───────────────────────────────────────────── -->
  <div id="camTestOverlay">
    <div class="cam-card">

      <!-- Header -->
      <div class="cam-header">
        <h2>
          📷 Camera Test
          <span id="camHdrBadge" class="cam-hdr-badge" style="display:none;">HDR</span>
        </h2>
        <button id="btnCamClose" class="cam-close-btn" title="Close">✕</button>
      </div>

      <!-- Info row -->
      <div id="camInfoRow" class="cam-info-row" style="display:none;">
        <span id="camInfoText"></span>
      </div>

      <!-- Video preview -->
      <!-- Camera viewfinder — same HTML structure as stepCamera in mobile.html.
           Edit css/camera.css + js/camera-ruler.js to update both together. -->
      <div id="camPreviewWrap" style="display:none; position:relative; aspect-ratio:4/3; border-radius:0.75rem; overflow:hidden; background:#000;">
        <div class="cam-viewfinder" style="position:absolute;inset:0;">
          <video id="camTestVideo" autoplay playsinline muted></video>
          <!-- Ruler corner block (top-left) -->
          <div class="cam-ruler-corner"></div>
          <!-- Horizontal ruler (top) — drawn by camera-ruler.js -->
          <canvas class="cam-ruler-h"></canvas>
          <!-- Vertical ruler (left) — drawn by camera-ruler.js -->
          <canvas class="cam-ruler-v"></canvas>
          <!-- Frame border + corner brackets -->
          <div class="cam-frame">
            <div class="cam-frame-border"></div>
            <div class="cam-frame-corner tl"></div>
            <div class="cam-frame-corner tr"></div>
            <div class="cam-frame-corner bl"></div>
            <div class="cam-frame-corner br"></div>
          </div>
        </div>
      </div>

      <!-- Status text -->
      <div id="camStatus" class="cam-status">Starting camera...</div>

      <!-- Progress dots (3 shots) -->
      <div id="camDots" class="cam-dots">
        <div id="camDot0" class="cam-dot"></div>
        <div id="camDot1" class="cam-dot"></div>
        <div id="camDot2" class="cam-dot"></div>
      </div>

      <!-- Thumbnails (4 results) -->
      <div id="camResults" class="cam-results"></div>

      <!-- Upload log -->
      <div id="camLog" class="cam-log"></div>

      <!-- Debug log panel -->
      <div id="camDebugPanel" class="cam-debug-panel">
        <div class="cam-debug-title">🔍 DEBUG LOG</div>
        <div id="camDebugLog" class="cam-debug-log"></div>
      </div>

      <!-- Action buttons -->
      <div class="cam-btns">
        <button id="btnCamShoot" class="btn-cam-start" disabled>Starting...</button>
      </div>

      <!-- Rename dialog (overlaid after capture, before upload) -->
      <div id="camRenameOverlay" class="cam-rename-overlay">
        <div class="cam-rename-box">
          <div class="cam-rename-title">💾 Name This Capture</div>
          <input id="camRenameInput" type="text" class="cam-rename-input"
            placeholder="Enter name (alphanumeric or Chinese)" maxlength="40" />
          <div class="cam-rename-hint">
            Files will be named:<br>
            {name}_origin_&nbsp;&nbsp;{name}_-2EV_&nbsp;&nbsp;{name}_+2EV_&nbsp;&nbsp;{name}_hdr_
          </div>
          <button id="btnRenameConfirm" class="btn-rename-ok">Confirm &amp; Start Upload</button>
        </div>
      </div>

    </div>
  </div>

  <script src="./config.js"></script>
  <script>
    // If already logged in, skip login page
    if (sessionStorage.getItem('wp_auth') || localStorage.getItem('wp_auth')) {
      window.location.replace('./index.html');
    }

    // ── API endpoint ───────────────────────────────────────────────────────
    const BASE_URL  = window.__BACKEND_URL__ || window.__API_BASE__;
    const LOGIN_URL = BASE_URL + '/api/auth/login';
    const form       = document.getElementById('loginForm');
    const btnLogin   = document.getElementById('btnLogin');
    const btnCancel  = document.getElementById('btnCancel');
    const alertBox   = document.getElementById('alertBox');

    // Cancel → go back or redirect to Google
    btnCancel.addEventListener('click', () => {
      if (history.length > 1) {
        history.back();
      } else {
        window.location.href = 'https://www.google.com';
      }
    });

    // Show alert helper
    function showAlert(type, message) {
      const cls = type === 'success' ? 'alert-success' : type === 'info' ? 'alert-info' : 'alert-error';
      alertBox.className = 'alert-box ' + cls;
      alertBox.style.display = 'block';
      alertBox.textContent = message;
    }

    function hideAlert() {
      alertBox.style.display = 'none';
    }

    // Submit handler
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const username   = document.getElementById('username').value.trim();
      const password   = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      if (!username || !password) {
        showAlert('error', 'Please enter your username and password');
        return;
      }

      // Loading state
      btnLogin.disabled = true;
      btnLogin.innerHTML = '<span class="spinner"></span>Logging in...';

      // No response after 4s → prompt the user to wait
      const coldStartTimer = setTimeout(() => {
        showAlert('info', '⏳ Connecting, please wait...');
      }, 4000);

      // ── Save token and redirect helper ──
      function onLoginSuccess(data) {
        const store = rememberMe ? localStorage : sessionStorage;
        const user  = data.data?.user;
        store.setItem('wp_auth', '1');
        if (data.data?.token)     store.setItem('wp_token',     data.data.token);
        if (data.data?.sessionId) store.setItem('wp_sessionId', data.data.sessionId);
        if (user) {
          store.setItem('wp_user', JSON.stringify({ id: user.id, name: user.name, email: user.email || null, role: user.role, plan: user.plan }));
        }
        showAlert('success', '✔ Login successful');
        setTimeout(() => window.location.replace('./index.html'), 800);
      }

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 70000);

        const res = await fetch(LOGIN_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ account: username, password }),
          signal: controller.signal
        });
        clearTimeout(timeout);
        clearTimeout(coldStartTimer);

        let data = {};
        try { data = await res.json(); } catch { /* non-JSON body */ }

        if (data.success) {
          onLoginSuccess(data);
        } else if (res.status === 401 || res.status === 403) {
          showAlert('error', '✘ ' + (data.message || 'Incorrect username or password, please try again'));
        } else if (!res.ok) {
          showAlert('error', '✘ ' + (data.message || `Server error (${res.status}), please try again later`));
        } else {
          showAlert('error', '✘ ' + (data.message || 'Incorrect username or password, please try again'));
        }

      } catch (err) {
        clearTimeout(coldStartTimer);
        showAlert('error', '✘ Connection failed, please try again later');
      } finally {
        btnLogin.disabled = false;
        btnLogin.innerHTML = 'Log In';
      }
    });
  </script>

  <!-- ── Camera Test Module ────────────────────────────────────────────── -->
  <script type="module">
    import { getHDRCapabilities, captureHDRFrames, mergeHDR } from './js/hdr.js';
    import { drawCameraRulers } from './js/camera-ruler.js';

    // ── Cloudinary config (mirrors upload.js) ──────────────────────────────
    const CLD_CLOUD  = 'dnxqob2cu';
    const CLD_PRESET = 'WebTexureUpload';
    const CLD_URL    = `https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`;

    // ── DOM refs ───────────────────────────────────────────────────────────
    const overlay      = document.getElementById('camTestOverlay');
    const video        = document.getElementById('camTestVideo');
    const previewWrap  = document.getElementById('camPreviewWrap');
    const statusEl     = document.getElementById('camStatus');
    const dotsWrap     = document.getElementById('camDots');
    const dots         = [0, 1, 2].map(i => document.getElementById(`camDot${i}`));
    const resultsEl    = document.getElementById('camResults');
    const logEl        = document.getElementById('camLog');
    const hdrBadge     = document.getElementById('camHdrBadge');
    const infoRow      = document.getElementById('camInfoRow');
    const infoText     = document.getElementById('camInfoText');
    const btnShoot     = document.getElementById('btnCamShoot');

    let camStream = null;
    let isShooting = false;

    // ── Reset overlay to initial state ────────────────────────────────────
    function _reset() {
      resultsEl.style.display = 'none';
      resultsEl.innerHTML = '';
      logEl.innerHTML = '';
      dotsWrap.style.display = 'none';
      dots.forEach(d => { d.className = 'cam-dot'; });
      hdrBadge.style.display = 'none';
      infoRow.style.display = 'none';
      previewWrap.style.display = 'none';
      statusEl.textContent = 'Starting camera...';
      btnShoot.textContent = 'Starting...';
      isShooting = false;
    }

    // ── Open overlay + start camera ───────────────────────────────────────
    document.getElementById('btnCameraTest').addEventListener('click', async () => {
      _reset();
      overlay.classList.add('open');

      try {
        camStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width:  { ideal: 4096 },
            height: { ideal: 4096 },
          },
          audio: false,
        });
        video.srcObject = camStream;
        previewWrap.style.display = 'block';
        // Redraw rulers now that the viewfinder is visible and has dimensions
        const _vf = previewWrap.querySelector('.cam-viewfinder');
        if (_vf) drawCameraRulers(_vf);

        const track   = camStream.getVideoTracks()[0];
        const evCaps  = getHDRCapabilities(track);
        const settings = track.getSettings();

        if (evCaps) {
          hdrBadge.style.display = '';
          infoText.textContent = `HDR supported ✔  EV ${evCaps.min} ~ ${evCaps.max}  |  ${settings.width}×${settings.height}`;
          btnShoot.textContent = 'Start HDR Capture (3 shots)';
        } else {
          infoText.textContent = `Single-shot mode (exposure compensation not supported)  |  ${settings.width ?? '?'}×${settings.height ?? '?'}`;
          btnShoot.textContent = 'Take Photo';
        }
        infoRow.style.display = 'flex';
        statusEl.textContent = 'Camera ready';
        btnShoot.disabled = false;

      } catch (err) {
        statusEl.textContent = `Camera error: ${err.message}`;
      }
    });

    // ── Close ─────────────────────────────────────────────────────────────
    document.getElementById('btnCamClose').addEventListener('click', () => {
      if (isShooting) return;
      if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
      video.srcObject = null;
      overlay.classList.remove('open');
    });

    // ── Upload helper ─────────────────────────────────────────────────────
    async function _uploadToCloudinary(source, folder, publicId) {
      // source = ImageBitmap or HTMLCanvasElement
      const canvas = document.createElement('canvas');
      canvas.width  = source.width;
      canvas.height = source.height;
      canvas.getContext('2d').drawImage(source, 0, 0);
      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.93));
      const fd = new FormData();
      fd.append('file',          blob, publicId + '.jpg');
      fd.append('upload_preset', CLD_PRESET);
      fd.append('folder',        folder);
      fd.append('public_id',     publicId);
      const resp = await fetch(CLD_URL, { method: 'POST', body: fd });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
      return (await resp.json()).secure_url;
    }

    // ── Thumbnail helper ──────────────────────────────────────────────────
    function _addThumb(source, label) {
      const wrap  = document.createElement('div');
      wrap.className = 'cam-thumb-wrap';
      const canvas = document.createElement('canvas');
      const THUMB  = 240;
      const scale  = THUMB / Math.max(source.width, source.height);
      canvas.width  = Math.round(source.width  * scale);
      canvas.height = Math.round(source.height * scale);
      canvas.getContext('2d').drawImage(source, 0, 0, canvas.width, canvas.height);
      canvas.className = 'cam-thumb';
      const lbl = document.createElement('div');
      lbl.className = 'cam-thumb-label';
      lbl.textContent = label;
      wrap.append(canvas, lbl);
      resultsEl.appendChild(wrap);
    }

    // ── Capture helper (ImageCapture → canvas fallback) ──────────────────
    // Use grabFrame() instead of takePhoto() to avoid the "setPhotoOptions failed"
    // bug in Chrome Android. Fall back to a canvas snapshot if grabFrame() fails.
    async function _captureFrame() {
      if (typeof ImageCapture !== 'undefined') {
        try {
          const track = camStream.getVideoTracks()[0];
          const ic    = new ImageCapture(track);
          return await ic.grabFrame();
        } catch {
          // fall through to canvas snapshot
        }
      }
      // Canvas snapshot from live video
      const snap = document.createElement('canvas');
      snap.width  = video.videoWidth;
      snap.height = video.videoHeight;
      snap.getContext('2d').drawImage(video, 0, 0);
      return createImageBitmap(snap);
    }

    // ── Log helper ────────────────────────────────────────────────────────
    function _log(text, url) {
      const line = document.createElement('div');
      line.textContent = text;
      if (url) {
        const a = document.createElement('a');
        a.href = url; a.target = '_blank';
        a.className = 'cam-log-link';
        a.textContent = 'View ↗';
        line.appendChild(a);
      }
      logEl.appendChild(line);
    }

    // ── Debug log helper ───────────────────────────────────────────────────
    const _debugPanel = document.getElementById('camDebugPanel');
    const _debugLog   = document.getElementById('camDebugLog');
    function _dbg(msg, type = '') {
      _debugPanel.style.display = 'block';
      const span = document.createElement('span');
      if (type) span.className = type;
      span.textContent = msg + '\n';
      _debugLog.appendChild(span);
      _debugPanel.scrollTop = _debugPanel.scrollHeight;
      console.log('[CamTest]', msg);
    }
    function _dbgClear() {
      _debugLog.innerHTML = '';
      _debugPanel.style.display = 'none';
    }

    // ── Rename dialog ──────────────────────────────────────────────────────
    function _askFileName(defaultName) {
      return new Promise((resolve) => {
        const dlg   = document.getElementById('camRenameOverlay');
        const input = document.getElementById('camRenameInput');
        const btn   = document.getElementById('btnRenameConfirm');
        input.value = defaultName;
        dlg.style.display = 'flex';
        setTimeout(() => { input.focus(); input.select(); }, 80);

        function _confirm() {
          // sanitise: keep CJK, alphanumeric, underscore, hyphen
          const raw  = input.value.trim();
          const name = raw.replace(/[^\w\u4e00-\u9fff-]/g, '_') || defaultName;
          dlg.style.display = 'none';
          btn.removeEventListener('click', _confirm);
          input.removeEventListener('keydown', _onKey);
          resolve(name);
        }
        function _onKey(e) { if (e.key === 'Enter') _confirm(); }
        btn.addEventListener('click', _confirm);
        input.addEventListener('keydown', _onKey);
      });
    }

    // ── Shoot + HDR + Upload ──────────────────────────────────────────────
    btnShoot.addEventListener('click', async () => {
      if (!camStream || isShooting) return;
      isShooting = true;
      btnShoot.disabled = true;
      logEl.innerHTML = '';
      resultsEl.innerHTML = '';
      resultsEl.style.display = 'none';
      _dbgClear();

      const track  = camStream.getVideoTracks()[0];
      const evCaps = getHDRCapabilities(track);

      // Default filename: test_YYYYMMDD_HHmmss
      const _now = new Date();
      const _p   = n => String(n).padStart(2, '0');
      const defaultName = `test_${_now.getFullYear()}${_p(_now.getMonth()+1)}${_p(_now.getDate())}_${_p(_now.getHours())}${_p(_now.getMinutes())}${_p(_now.getSeconds())}`;

      let shots; // [{ bitmap, suffix, label }]

      try {
        if (evCaps) {
          // ── 3-shot HDR — inline with step-by-step debug logging ────
          dotsWrap.style.display = 'flex';
          dots.forEach(d => { d.className = 'cam-dot'; });

          _dbg(`evCaps: EV ${evCaps.min}~${evCaps.max} step=${evCaps.step}`, 'inf');

          const shotConfigs = [
            { ev: Math.max(evCaps.min, -2), label: 'Dark −2EV', key: 'dark'   },
            { ev: 0,                        label: 'Normal 0EV',  key: 'normal' },
            { ev: Math.min(evCaps.max,  2), label: 'Bright +2EV', key: 'bright' },
          ];
          const ic = new ImageCapture(track);
          const rawFrames = {};

          for (const [i, { ev, label, key }] of shotConfigs.entries()) {
            statusEl.textContent = `Capturing ${i+1}/3: ${label}`;
            dots.forEach((d, j) => {
              d.className = j < i ? 'cam-dot done' : j === i ? 'cam-dot active' : 'cam-dot';
            });

            // Step A: apply EV offset only (no exposureMode:'manual' — it triggers
            // setPhotoOptions in Chrome Android and crashes the track)
            _dbg(`[${i+1}] applyConstraints exposureCompensation=${ev}`);
            try {
              await track.applyConstraints({
                advanced: [{ exposureCompensation: ev }],
              });
              _dbg(`  ✔ applyConstraints OK`, 'ok');
            } catch (e) {
              _dbg(`  ✘ applyConstraints FAIL: ${e.name}: ${e.message}`, 'err');
              // non-fatal — device may still capture at current EV
            }

            await new Promise(r => setTimeout(r, 500));

            // Step B: capture via grabFrame() only.
            // Never use takePhoto() — it triggers setPhotoOptions in Chrome Android
            // and leaves the photo pipeline in a dirty state that makes subsequent
            // applyConstraints calls fail with "setPhotoOptions failed".
            _dbg(`[${i+1}] grabFrame()...`);
            let bitmap;
            try {
              bitmap = await ic.grabFrame();
              _dbg(`  ✔ grabFrame OK → ${bitmap.width}×${bitmap.height}`, 'ok');
            } catch (e) {
              _dbg(`  ✘ grabFrame FAIL: ${e.name}: ${e.message}`, 'err');
              throw new Error(`Capture shot ${i+1} failed: ${e.message}`);
            }
            rawFrames[key] = bitmap;
          }

          // Restore EV to 0
          try {
            await track.applyConstraints({ advanced: [{ exposureCompensation: 0 }] });
            _dbg(`EV reset to 0`, 'ok');
          } catch (e) {
            _dbg(`EV reset failed (non-fatal): ${e.message}`, 'err');
          }

          dots.forEach(d => { d.className = 'cam-dot done'; });
          statusEl.textContent = 'Merging HDR...';
          _dbg('Starting mergeHDR...');
          const hdrCanvas = mergeHDR(rawFrames.dark, rawFrames.normal, rawFrames.bright);
          _dbg(`✔ mergeHDR complete ${hdrCanvas.width}×${hdrCanvas.height}`, 'ok');

          shots = [
            { bitmap: rawFrames.normal, suffix: '_origin_', label: 'Normal 0EV'  },
            { bitmap: rawFrames.dark,   suffix: '_-2EV_',   label: 'Dark −2EV' },
            { bitmap: rawFrames.bright, suffix: '_+2EV_',   label: 'Bright +2EV' },
            { bitmap: hdrCanvas,        suffix: '_hdr_',    label: 'HDR Merged'  },
          ];

        } else {
          // ── Single-shot fallback (no EV control) ───────────────────
          statusEl.textContent = 'Capturing...';
          shots = [
            { bitmap: await _captureFrame(), suffix: '_origin_', label: 'Photo' },
          ];
        }

        // ── Show thumbnails ───────────────────────────────────────────
        resultsEl.style.display = 'grid';
        for (const { bitmap, label } of shots) {
          _addThumb(bitmap, label);
        }

        // ── Ask for filename ──────────────────────────────────────────
        statusEl.textContent = 'Please name this capture...';
        const baseName = await _askFileName(defaultName);
        const folder   = `device-test/${baseName}`;

        // ── Upload all to Cloudinary ──────────────────────────────────
        statusEl.textContent = `Uploading ${shots.length} shots to Cloudinary...`;
        let allOk = true;

        for (const { bitmap, suffix, label } of shots) {
          const publicId = `${baseName}${suffix}`;
          try {
            const url = await _uploadToCloudinary(bitmap, folder, publicId);
            _log(`✔ ${label}  `, url);
          } catch (err) {
            _log(`✘ ${label}: ${err.message}`);
            allOk = false;
          }
        }

        statusEl.textContent = allOk ? '✔ All uploads complete!' : '⚠ Some uploads failed';
        dotsWrap.style.display = 'none';
        btnShoot.textContent = 'Test Again';
        btnShoot.disabled = false;

      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
        dotsWrap.style.display = 'none';
        btnShoot.textContent = 'Retry';
        btnShoot.disabled = false;
      } finally {
        isShooting = false;
      }
    });
  </script>

</body>
</html>
