<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SNAPBRIFY</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,700;1,6..96,400&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background":                "#09090B",
            "surface":                   "#18181B",
            "surface-dim":               "#121317",
            "surface-bright":            "#27272A",
            "surface-container-lowest":  "#0d0e12",
            "surface-container-low":     "#18181B",
            "surface-container":         "#1F1F22",
            "surface-container-high":    "#27272A",
            "surface-container-highest": "#27272A",
            "surface-variant":           "#27272A",
            "on-surface":                "#F4F4F5",
            "on-surface-variant":        "#A1A1AA",
            "outline":                   "#52525B",
            "outline-variant":           "#3F3F46",
            "primary":                   "#E8C854",
            "primary-container":         "#C9A630",
            "primary-fixed":             "#F5E080",
            "on-primary":                "#18181B",
            "error":                     "#ffb4ab",
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
          spacing: { "margin-page": "64px", "container-padding": "32px", "gutter": "24px", "margin-mobile": "24px", "unit": "8px", "stack-gap": "16px" },
          fontFamily: { "headline-xl": ["Bodoni Moda","serif"], "headline-lg": ["Cinzel","serif"], "body-lg": ["Playfair Display","serif"], "body-md": ["Cormorant Garamond","serif"], "label-sm": ["Cormorant Garamond","serif"], "label-xs": ["Cormorant Garamond","serif"] },
          fontSize: {
            "headline-xl": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
            "headline-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }],
            "headline-lg-mobile": ["28px", { lineHeight: "1.2", fontWeight: "600" }],
            "label-sm": ["12px", { lineHeight: "1.0", letterSpacing: "0.08em", fontWeight: "500" }],
            "label-xs": ["10px", { lineHeight: "1.0", letterSpacing: "0.1em", fontWeight: "600" }],
            "body-lg": ["18px", { lineHeight: "1.6", letterSpacing: "0.01em", fontWeight: "400" }],
            "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }]
          },
          keyframes: {
            "fade-up": { "0%": { opacity: "0", transform: "translateY(24px)" }, "100%": { opacity: "1", transform: "translateY(0)" } }
          },
          animation: {
            "fade-up": "fade-up 0.9s cubic-bezier(0.22,1,0.36,1) forwards"
          }
        }
      }
    }
  </script>
  <style>
    body { text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
    .studio-light-bg { background: radial-gradient(circle at 50% 0%, rgba(232,200,84,0.05) 0%, rgba(9,9,11,1) 70%); }
    .glass-card { box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(232,200,84,0.08); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    .spinner { display:inline-block;width:14px;height:14px;border:2px solid #18181B;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:4px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .anim-fade-up { opacity: 0; animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) forwards; }
    .anim-delay-1 { animation-delay: 0.12s; }
    .anim-delay-2 { animation-delay: 0.28s; }
    @media (prefers-reduced-motion: reduce) {
      .anim-fade-up { animation: none; opacity: 1; transform: none; }
      .animate-pulse { animation: none; }
    }
    .alert-box {
      display: none;
      border-radius: 0 8px 8px 0;
      padding: 11px 14px 11px 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.02em;
      line-height: 1.5;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .alert-success {
      background: rgba(16, 185, 129, 0.08);
      border-left: 3px solid #10b981;
      border-top: 1px solid rgba(16,185,129,0.15);
      border-right: 1px solid rgba(16,185,129,0.15);
      border-bottom: 1px solid rgba(16,185,129,0.15);
      color: #6ee7b7;
    }
    .alert-error {
      background: rgba(220, 38, 38, 0.08);
      border-left: 3px solid #dc2626;
      border-top: 1px solid rgba(220,38,38,0.18);
      border-right: 1px solid rgba(220,38,38,0.18);
      border-bottom: 1px solid rgba(220,38,38,0.18);
      color: #fca5a5;
    }
    .alert-info {
      background: rgba(232, 200, 84, 0.06);
      border-left: 3px solid #E8C854;
      border-top: 1px solid rgba(232,200,84,0.15);
      border-right: 1px solid rgba(232,200,84,0.15);
      border-bottom: 1px solid rgba(232,200,84,0.15);
      color: rgba(232, 200, 84, 0.9);
    }
  </style>
  <script src="./js/i18n.js"></script>
</head>
<body class="bg-background text-on-surface font-body-md antialiased min-h-screen flex items-center justify-center px-margin-mobile py-16 md:px-margin-page studio-light-bg overflow-x-hidden relative selection:bg-primary selection:text-on-primary">

  <!-- Fine gold grid -->
  <div class="fixed inset-0 z-0 pointer-events-none bg-[linear-gradient(rgba(232,200,84,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(232,200,84,0.03)_1px,transparent_1px)] bg-[size:60px_60px]"></div>

  <!-- Ambient glow -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-[20%] left-1/2 -translate-x-1/2 w-[60vw] h-[60vw] max-w-[640px] max-h-[640px] bg-primary/5 rounded-full blur-[100px]"></div>
    <div class="absolute -bottom-[25%] -right-[15%] w-[45vw] h-[45vw] max-w-[460px] max-h-[460px] bg-primary/5 rounded-full blur-[100px]"></div>
  </div>

  <main class="w-full max-w-md z-10 relative">

    <!-- Brand -->
    <div class="text-center mb-10 anim-fade-up">
      <a href="./index.html" class="font-headline-lg text-[24px] md:text-[30px] font-semibold uppercase tracking-[0.35em] pl-[0.35em] text-primary hover:text-primary-fixed transition-colors duration-300 inline-block">SNAPBRIFY</a>
      <div class="mt-6 flex justify-center">
        <span class="inline-flex items-center gap-2 border border-outline-variant/40 rounded-full px-4 py-1.5 bg-surface-container/60 backdrop-blur">
          <span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>
          <span class="font-label-xs text-[10px] uppercase tracking-[0.25em] text-primary" data-i18n="auth_eyebrow_login">Member Access</span>
        </span>
      </div>
    </div>

    <!-- Card -->
    <div class="anim-fade-up anim-delay-1 bg-surface-container/60 border border-outline-variant/30 rounded-xl backdrop-blur glass-card p-8 md:p-10 transition-all duration-300 hover:border-primary/30 hover:-translate-y-1">
      <header class="mb-8 text-center">
        <h2 class="font-headline-lg text-[22px] md:text-[26px] uppercase tracking-[0.08em] text-on-surface mb-4" data-i18n="login_welcome">Welcome Back</h2>
        <div class="h-px w-2/3 mx-auto bg-gradient-to-r from-transparent via-primary/40 to-transparent mb-4"></div>
        <p class="font-body-md text-body-md italic text-on-surface-variant" data-i18n="login_desc">Sign in to access your workspace.</p>
      </header>

      <!-- Alert area -->
      <div id="alertBox" class="alert-box mb-6"></div>

      <form id="loginForm" autocomplete="on" novalidate class="flex flex-col gap-gutter">
        <!-- Username -->
        <div class="group flex flex-col gap-unit">
          <label class="font-label-xs text-[11px] uppercase tracking-[0.25em] text-on-surface-variant group-focus-within:text-primary transition-colors duration-300" for="username" data-i18n="login_account_label">Account</label>
          <div class="relative">
            <input id="username" name="username" type="text" autocomplete="username" required
              class="w-full bg-transparent border-b border-outline-variant focus:border-primary outline-none py-3 pr-9 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 transition-colors duration-300"
              placeholder="Username" />
            <span class="material-symbols-outlined absolute right-1 top-1/2 -translate-y-1/2 text-[18px] text-on-surface-variant/60 group-focus-within:text-primary transition-colors duration-300 pointer-events-none">person</span>
          </div>
        </div>

        <!-- Password -->
        <div class="group flex flex-col gap-unit">
          <label class="font-label-xs text-[11px] uppercase tracking-[0.25em] text-on-surface-variant group-focus-within:text-primary transition-colors duration-300" for="password" data-i18n="login_password_label">Password</label>
          <div class="relative">
            <input id="password" name="password" type="password" autocomplete="current-password" required
              class="w-full bg-transparent border-b border-outline-variant focus:border-primary outline-none py-3 pr-9 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 transition-colors duration-300"
              placeholder="••••••••" />
            <span class="material-symbols-outlined absolute right-1 top-1/2 -translate-y-1/2 text-[18px] text-on-surface-variant/60 group-focus-within:text-primary transition-colors duration-300 pointer-events-none">lock</span>
          </div>
        </div>

        <!-- Remember me / Forgot password -->
        <div class="flex items-center justify-between gap-4 flex-wrap">
          <div class="flex items-center gap-3">
            <input type="checkbox" id="rememberMe" name="rememberMe" checked
              class="w-4 h-4 rounded border border-outline-variant/50 bg-surface-variant/30 accent-primary cursor-pointer" />
            <label for="rememberMe" class="font-label-sm text-label-sm text-on-surface-variant cursor-pointer select-none hover:text-on-surface transition-colors duration-300">
              <span data-i18n="login_remember">Remember Me</span> <span class="text-on-surface-variant/40 block sm:inline" data-i18n="login_remember_hint">(Do not use on public computers)</span>
            </label>
          </div>
          <a href="./reset-password.html"
            class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors duration-300 border-b border-transparent hover:border-primary/60 pb-0.5" data-i18n="auth_forgot_password">
            Forgot password?
          </a>
        </div>

        <!-- Divider -->
        <div class="h-px bg-gradient-to-r from-transparent via-primary/40 to-transparent mt-2"></div>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-stack-gap mt-2">
          <button type="submit" id="btnLogin"
            class="flex-1 bg-primary text-on-primary rounded-full px-8 py-4 font-label-sm text-[12px] uppercase tracking-widest hover:bg-primary-container active:scale-95 transition-all duration-300 shadow-[0_8px_24px_rgba(232,200,84,0.2)] hover:shadow-[0_12px_32px_rgba(232,200,84,0.35)]" data-i18n="login_btn">
            Log In
          </button>
          <button type="button" id="btnCancel"
            class="flex-1 bg-transparent border border-outline-variant/40 text-on-surface-variant rounded-full px-8 py-4 font-label-sm text-[12px] uppercase tracking-widest hover:text-on-surface hover:border-primary/40 hover:bg-surface-container-high/40 active:scale-95 transition-all duration-300" data-i18n="editor_cancel">
            Cancel
          </button>
        </div>
      </form>
    </div>

    <!-- Sign up -->
    <div class="mt-10 text-center anim-fade-up anim-delay-2">
      <div class="h-px w-1/2 mx-auto bg-gradient-to-r from-transparent via-primary/40 to-transparent mb-6"></div>
      <p class="font-body-md text-body-md text-on-surface-variant">
        <span data-i18n="login_no_account">Don't have an account?</span>
        <a href="./signup.html" class="text-primary hover:text-primary-fixed font-label-sm text-label-sm uppercase tracking-widest ml-2 transition-colors duration-300 border-b border-transparent hover:border-primary pb-0.5" data-i18n="sign_up">Sign Up</a>
      </p>
    </div>
  </main>

  <script>
    // If already logged in, skip login page
    if (sessionStorage.getItem('wp_auth') || localStorage.getItem('wp_auth')) {
      window.location.replace('./index.html');
    }

    // If accessed directly (no ?ref=app param), redirect to the landing page first
    if (!new URLSearchParams(window.location.search).get('ref')) {
      window.location.replace('./index.html');
    }

    const BASE_URL  = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? `${window.location.protocol}//${window.location.host}`
      : 'https://webphoto-lidl.onrender.com';
    const LOGIN_URL = BASE_URL + '/login';
    const form      = document.getElementById('loginForm');
    const btnLogin  = document.getElementById('btnLogin');
    const btnCancel = document.getElementById('btnCancel');
    const alertBox  = document.getElementById('alertBox');

    btnCancel.addEventListener('click', () => {
      if (history.length > 1) history.back();
      else window.location.href = './index.html';
    });

    function showAlert(type, message) {
      const cls = type === 'success' ? 'alert-success' : type === 'info' ? 'alert-info' : 'alert-error';
      alertBox.className = 'alert-box ' + cls;
      alertBox.style.display = 'block';
      alertBox.textContent = message;
    }
    function hideAlert() { alertBox.style.display = 'none'; }
    function _sanitize(msg, fallback) {
      return (!msg || /[一-鿿]/.test(msg)) ? fallback : msg;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const username   = document.getElementById('username').value.trim();
      const password   = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      if (!username || !password) { showAlert('error', 'Please enter your username and password'); return; }

      btnLogin.disabled = true;
      btnLogin.innerHTML = '<span class="spinner"></span>Signing in...';

      const coldStartTimer = setTimeout(() => showAlert('info', 'Connecting, please wait...'), 4000);

      function onLoginSuccess(data) {
        const store = rememberMe ? localStorage : sessionStorage;
        store.setItem('wp_auth', '1');
        if (data.username) store.setItem('wp_user', JSON.stringify({ id: data.username, name: data.username, email: data.email || null }));
        if (data.token) store.setItem('wp_token', data.token);
        if (data.sessionId) store.setItem('wp_sessionId', data.sessionId);
        showAlert('success', '✔ Login successful. Welcome back!');
        setTimeout(() => window.location.replace('./index.html'), 800);
      }

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 70000);
        const res = await fetch(LOGIN_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          signal: controller.signal
        });
        clearTimeout(timeout);
        clearTimeout(coldStartTimer);
        const data = await res.json();
        if (data.ok) { onLoginSuccess(data); }
        else { showAlert('error', '✘ ' + _sanitize(data.message, 'Incorrect username or password.')); }
      } catch (err) {
        clearTimeout(coldStartTimer);
        showAlert('error', '✘ Connection failed. Please try again.');
      } finally {
        btnLogin.disabled = false;
        btnLogin.innerHTML = 'Log In';
      }
    });
  </script>
</body>
</html>
