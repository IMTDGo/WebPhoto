<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - WebPhoto</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(ellipse at 50% 40%, #1e2a3a 0%, #0d1117 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Modal card */
    .login-card {
      background: #1c2333;
      border-radius: 1.25rem;
      padding: 2.5rem 2.25rem 2rem;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.55);
    }

    /* Input fields — match screenshot dark style */
    .login-input {
      width: 100%;
      background: #252d3d;
      border: 1.5px solid transparent;
      border-radius: 0.625rem;
      color: #e0e6f0;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.18s;
    }
    .login-input:focus {
      border-color: #3b82f6;
    }
    .login-input::placeholder {
      color: #6b7a8d;
    }

    /* Checkbox accent */
    .login-checkbox {
      accent-color: #3b82f6;
      width: 1.1rem;
      height: 1.1rem;
      cursor: pointer;
    }

    /* Buttons */
    .btn-cancel {
      border: 1.5px solid #4b5563;
      border-radius: 9999px;
      padding: 0.6rem 1.6rem;
      background: transparent;
      color: #cbd5e1;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-cancel:hover {
      background: #252d3d;
      border-color: #6b7280;
    }

    .btn-login {
      border: none;
      border-radius: 9999px;
      padding: 0.65rem 1.8rem;
      background: #f1f5f9;
      color: #1e40af;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-login:hover {
      background: #e2e8f0;
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Alert box */
    .alert-box {
      border-radius: 0.5rem;
      padding: 0.65rem 1rem;
      font-size: 0.875rem;
      display: none;
    }
    .alert-success {
      background: #1a3a2a;
      border: 1px solid #22c55e;
      color: #4ade80;
    }
    .alert-error {
      background: #3a1a1a;
      border: 1px solid #ef4444;
      color: #f87171;
    }
    .alert-info {
      background: #1a2a3a;
      border: 1px solid #60a5fa;
      color: #93c5fd;
    }

    /* Loading spinner inside button */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #3b82f6;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Camera Test ──────────────────────────────────────────────────────── */
    .btn-camera-test {
      background: none;
      border: 1px dashed #374151;
      border-radius: 9999px;
      padding: 0.35rem 1.1rem;
      color: #4b5563;
      font-size: 0.75rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.03em;
    }
    .btn-camera-test:hover { color: #9ca3af; border-color: #6b7280; }

    #camTestOverlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #camTestOverlay.open { display: flex; }

    .cam-card {
      background: #1c2333;
      border-radius: 1.25rem;
      padding: 1.5rem;
      width: 100%;
      max-width: 540px;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.65);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .cam-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .cam-header h2 { color: #e0e6f0; font-size: 1rem; font-weight: 600; margin: 0; }
    .cam-close-btn {
      background: none; border: none;
      color: #6b7280; font-size: 1.3rem;
      cursor: pointer; line-height: 1; padding: 0.2rem 0.4rem;
      border-radius: 0.25rem;
    }
    .cam-close-btn:hover { color: #e0e6f0; background: #252d3d; }

    #camTestVideo {
      width: 100%; border-radius: 0.75rem;
      background: #0d1117; display: block;
      max-height: 220px; object-fit: cover;
    }
    .cam-status {
      color: #94a3b8; font-size: 0.85rem;
      text-align: center; min-height: 1.2em;
    }
    .cam-dots {
      display: none; gap: 0.75rem;
      justify-content: center; align-items: center;
    }
    .cam-dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: #374151; transition: background 0.25s;
    }
    .cam-dot.active { background: #60a5fa; box-shadow: 0 0 6px #60a5fa88; }
    .cam-dot.done   { background: #22c55e; }

    .cam-results {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0.6rem;
    }
    .cam-thumb-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
    }
    .cam-thumb {
      width: 100%; height: 80px; object-fit: cover;
      border-radius: 0.5rem; border: 1px solid #374151;
      display: block;
    }
    .cam-thumb-label {
      color: #94a3b8; font-size: 0.7rem; text-align: center;
    }
    .cam-log {
      font-size: 0.78rem; color: #94a3b8;
      display: flex; flex-direction: column; gap: 0.25rem;
    }
    .cam-log-link {
      color: #60a5fa; text-decoration: underline; margin-left: 0.4rem;
    }
    .cam-btns {
      display: flex; justify-content: center; gap: 0.75rem; flex-wrap: wrap;
    }
    .btn-cam-start {
      border: none; border-radius: 9999px;
      padding: 0.62rem 1.8rem;
      background: #3b82f6; color: #fff;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-cam-start:hover { background: #2563eb; }
    .btn-cam-start:disabled { opacity: 0.5; cursor: not-allowed; }
    .cam-hdr-badge {
      display: inline-block;
      background: #7c3aed; color: #f5f3ff;
      font-size: 0.65rem; font-weight: 700;
      border-radius: 0.25rem; padding: 0.1rem 0.35rem;
      letter-spacing: 0.05em; vertical-align: middle;
      margin-left: 0.35rem;
    }
    .cam-info-row {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; font-size: 0.75rem; color: #6b7280;
    }
  </style>
</head>

  <script>
    // If already logged in, skip login page
    if (sessionStorage.getItem('wp_auth') || localStorage.getItem('wp_auth')) {
      window.location.replace('./index.html');
    }

    // ── API endpoint ───────────────────────────────────────────────────────
    const BASE_URL  = window.__BACKEND_URL__ || window.__API_BASE__;
    const LOGIN_URL = BASE_URL + '/api/auth/login';
    const form       = document.getElementById('loginForm');
    const btnLogin   = document.getElementById('btnLogin');
    const btnCancel  = document.getElementById('btnCancel');
    const alertBox   = document.getElementById('alertBox');

    // Cancel → go back or redirect to Google
    btnCancel.addEventListener('click', () => {
      if (history.length > 1) {
        history.back();
      } else {
        window.location.href = 'https://www.google.com';
      }
    });

    // Show alert helper
    function showAlert(type, message) {
      const cls = type === 'success' ? 'alert-success' : type === 'info' ? 'alert-info' : 'alert-error';
      alertBox.className = 'alert-box ' + cls;
      alertBox.style.display = 'block';
      alertBox.textContent = message;
    }

    function hideAlert() {
      alertBox.style.display = 'none';
    }

    // Submit handler
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const username   = document.getElementById('username').value.trim();
      const password   = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      if (!username || !password) {
        showAlert('error', '請輸入帳號與密碼');
        return;
      }

      // Loading state
      btnLogin.disabled = true;
      btnLogin.innerHTML = '<span class="spinner"></span>登入中...';

      // 超過 4 秒還沒回應 → 提示等待
      const coldStartTimer = setTimeout(() => {
        showAlert('info', '⏳ 連線中，請稍候...');
      }, 4000);

      // ── Save token and redirect helper ──
      function onLoginSuccess(data) {
        const store = rememberMe ? localStorage : sessionStorage;
        const user  = data.data?.user;
        store.setItem('wp_auth', '1');
        if (data.data?.token)     store.setItem('wp_token',     data.data.token);
        if (data.data?.sessionId) store.setItem('wp_sessionId', data.data.sessionId);
        if (user) {
          store.setItem('wp_user', JSON.stringify({ id: user.id, name: user.name, email: user.email || null, role: user.role, plan: user.plan }));
        }
        showAlert('success', '✔ ' + data.message);
        setTimeout(() => window.location.replace('./index.html'), 800);
      }

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 70000);

        const res = await fetch(LOGIN_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ account: username, password }),
          signal: controller.signal
        });
        clearTimeout(timeout);
        clearTimeout(coldStartTimer);

        let data = {};
        try { data = await res.json(); } catch { /* non-JSON body */ }

        if (data.success) {
          onLoginSuccess(data);
        } else if (res.status === 401 || res.status === 403) {
          showAlert('error', '✘ ' + (data.message || '帳號或密碼錯誤，請重試'));
        } else if (!res.ok) {
          showAlert('error', '✘ ' + (data.message || `伺服器錯誤 (${res.status})，請稍後再試`));
        } else {
          showAlert('error', '✘ ' + (data.message || '帳號或密碼錯誤，請重試'));
        }

      } catch (err) {
        clearTimeout(coldStartTimer);
        showAlert('error', '✘ 連線失敗，請稍後再試');
      } finally {
        btnLogin.disabled = false;
        btnLogin.innerHTML = 'Log In';
      }
    });
  </script>

      canvas.getContext('2d').drawImage(source, 0, 0);
