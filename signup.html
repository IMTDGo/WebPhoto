<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - WebPhoto</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(ellipse at 50% 40%, #1e2a3a 0%, #0d1117 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1c2333;
      border-radius: 1.25rem;
      padding: 2.5rem 2.25rem 2rem;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.55);
    }
    .login-input {
      width: 100%;
      background: #252d3d;
      border: 1.5px solid transparent;
      border-radius: 0.625rem;
      color: #e0e6f0;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.18s;
    }
    .login-input:focus { border-color: #3b82f6; }
    .login-input::placeholder { color: #6b7a8d; }
    .btn-cancel {
      border: 1.5px solid #4b5563;
      border-radius: 9999px;
      padding: 0.6rem 1.6rem;
      background: transparent;
      color: #cbd5e1;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-cancel:hover { background: #252d3d; border-color: #6b7280; }
    .btn-primary-action {
      border: none;
      border-radius: 9999px;
      padding: 0.65rem 1.8rem;
      background: #f1f5f9;
      color: #1e40af;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary-action:hover { background: #e2e8f0; }
    .btn-primary-action:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert-box {
      border-radius: 0.5rem;
      padding: 0.65rem 1rem;
      font-size: 0.875rem;
      display: none;
    }
    .alert-success { background: #1a3a2a; border: 1px solid #22c55e; color: #4ade80; }
    .alert-error   { background: #3a1a1a; border: 1px solid #ef4444; color: #f87171; }
    .alert-info    { background: #1a2a3a; border: 1px solid #60a5fa; color: #93c5fd; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #3b82f6; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .otp-input {
      letter-spacing: 0.5rem;
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- ── STEP 1: Fill in details ── -->
    <div id="step1">
      <h1 class="text-center text-white font-bold text-2xl mb-1">Create Account</h1>
      <p class="text-center text-slate-500 text-sm mb-6">建立您的 WebPhoto 帳號</p>

      <div id="alertBox1" class="alert-box mb-4"></div>

      <form id="step1Form" autocomplete="on" novalidate>

        <div class="mb-3">
          <input id="s1Username" name="username" type="text"
            class="login-input" placeholder="帳號（英數字或底線，3–30 字元）"
            autocomplete="username" required />
        </div>

        <div class="mb-3">
          <input id="s1Name" name="name" type="text"
            class="login-input" placeholder="顯示名稱"
            autocomplete="name" required />
        </div>

        <div class="mb-3">
          <input id="s1Password" name="password" type="password"
            class="login-input" placeholder="密碼（至少 8 個字元）"
            autocomplete="new-password" required />
        </div>

        <div class="mb-3">
          <input id="s1Confirm" name="confirm" type="password"
            class="login-input" placeholder="確認密碼"
            autocomplete="new-password" required />
        </div>

        <div class="mb-4">
          <input id="s1Email" name="email" type="email"
            class="login-input" placeholder="Email 地址"
            autocomplete="email" required />
        </div>

        <div class="text-center mb-5">
          <span class="text-sm text-slate-400">Already have an account? </span>
          <a href="./login.html" class="text-sm text-blue-400 hover:underline">Sign in.</a>
        </div>

        <div class="flex justify-end gap-3">
          <button type="button" class="btn-cancel" id="btnCancel1">Cancel</button>
          <button type="submit" class="btn-primary-action" id="btnRegister">Register</button>
        </div>

      </form>
    </div>

  </div>

  <script src="./config.js"></script>
  <script>
    const BASE_URL = window.__BACKEND_URL__ || window.__API_BASE__;

    // ── Helpers ──
    function showAlert(type, msg) {
      const el = document.getElementById('alertBox1');
      el.className = 'alert-box ' + (type === 'success' ? 'alert-success' : 'alert-error');
      el.style.display = 'block';
      el.textContent   = msg;
    }
    function hideAlert() {
      document.getElementById('alertBox1').style.display = 'none';
    }

    // ── Cancel ──
    document.getElementById('btnCancel1').addEventListener('click', () => {
      if (history.length > 1) history.back();
      else window.location.href = './login.html';
    });

    // ── Register ──
    document.getElementById('step1Form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const account  = document.getElementById('s1Username').value.trim();
      const name     = document.getElementById('s1Name').value.trim();
      const password = document.getElementById('s1Password').value;
      const confirm  = document.getElementById('s1Confirm').value;
      const email    = document.getElementById('s1Email').value.trim();

      if (!account || !name || !password || !confirm || !email) {
        showAlert('error', '請填寫所有欄位');
        return;
      }
      if (!/^[a-zA-Z0-9_]{3,30}$/.test(account)) {
        showAlert('error', '帳號只能使用英數字和底線，長度 3–30 字元');
        return;
      }
      if (password.length < 8) {
        showAlert('error', '密碼至少需要 8 個字元');
        return;
      }
      if (password !== confirm) {
        showAlert('error', '兩次密碼輸入不一致');
        return;
      }

      const btn = document.getElementById('btnRegister');
      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span>註冊中...';

      try {
        const res = await fetch(`${BASE_URL}/api/auth/register`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ account, password, name, email, permission: 'viewer' })
        });
        const data = await res.json();
        if (data.ok) {
          showAlert('success', '✔ ' + data.message);
          setTimeout(() => window.location.replace('./login.html'), 1500);
        } else {
          showAlert('error', '✘ ' + data.message);
        }
      } catch (err) {
        showAlert('error', '✘ 連線失敗，請稍後再試');
      } finally {
        btn.disabled  = false;
        btn.innerHTML = 'Register';
      }
    });
  </script>

</body>
</html>
