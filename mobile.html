<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>WebPhoto - 手機版</title>
  <script>
    // Auth guard — must be logged in
    if (!sessionStorage.getItem('wp_auth') && !localStorage.getItem('wp_auth')) {
      window.location.replace('./login.html');
    }
    // Auto-redirect large screens to desktop version
    const isLargeScreen = window.innerWidth >= 1024 && window.innerHeight >= 768 && !/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isLargeScreen) {
      window.location.replace('./desktop.html');
    }
  </script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      overscroll-behavior: none;
      touch-action: manipulation;
      background: radial-gradient(90% 70% at 20% 0%, #1f2a44 0%, #0f172a 40%, #05070f 100%);
    }
    #cropCanvas { touch-action: none; display: block; }
    #previewCanvas { image-rendering: pixelated; display: block; }
    #cameraVideo { width: 100%; height: 100%; object-fit: cover; display: block; }
    .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 12px); }
  </style>
</head>
<body class="text-base-content min-h-screen flex flex-col">

  <div class="navbar bg-base-100/90 backdrop-blur shadow px-4 shrink-0 border-b border-base-content/10">
    <span class="text-lg font-black tracking-wide text-primary">WebPhoto Mobile</span>
    <div class="flex-1"></div>
    <span id="navUsername" class="text-xs text-base-content/60 hidden mr-2"></span>
    <button id="btnLogout" class="btn btn-xs btn-ghost text-error hidden mr-1">登出</button>
    <a href="desktop.html" class="btn btn-xs btn-ghost opacity-70">電腦版</a>
  </div>
  <script>
    (function () {
      const raw = sessionStorage.getItem('wp_user') || localStorage.getItem('wp_user');
      if (raw) {
        try {
          const user = JSON.parse(raw);
          const el = document.getElementById('navUsername');
          el.textContent = '👤 ' + (user.name || user.id);
          el.classList.remove('hidden');
          document.getElementById('btnLogout').classList.remove('hidden');
        } catch (e) {}
      }
      document.getElementById('btnLogout').addEventListener('click', () => {
        ['wp_auth', 'wp_token', 'wp_sessionId', 'wp_user'].forEach(k => {
          localStorage.removeItem(k);
          sessionStorage.removeItem(k);
        });
        window.location.replace('./login.html');
      });
    })();
  </script>

  <main class="flex-1 relative overflow-hidden" style="min-height:0">
    <!-- Step 1: entry -->
    <section id="stepEntry" class="h-full flex flex-col p-4 gap-4">
      <div class="rounded-2xl bg-base-100/90 backdrop-blur shadow-xl border border-base-content/10 p-4">
        <h1 class="text-xl font-bold">快速開始</h1>
        <p class="text-sm text-base-content/60 mt-1">先拍一張，或從相簿選擇，再拖曳調整裁切區域。</p>
      </div>

      <button id="btnOpenCamera" class="btn btn-primary btn-lg h-16 justify-start text-base gap-3 rounded-2xl shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        直接拍照
      </button>

      <label class="btn btn-outline btn-lg h-16 justify-start text-base gap-3 rounded-2xl bg-base-100/80 border-base-content/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        從相簿選擇
        <input type="file" accept="image/*,.tif,.tiff" class="hidden" id="fileInputGallery" />
      </label>

      <!-- Fallback when camera permission is unavailable -->
      <input type="file" accept="image/*" capture="environment" class="hidden" id="fileInputCapture" />

      <div class="mt-auto rounded-xl bg-base-100/70 p-3 text-xs text-base-content/60 border border-base-content/10">
        小提示: 裁切頁可拖曳移動，拉角縮放，雙指可縮放裁切範圍。
      </div>
    </section>

    <!-- Step 2: camera -->
    <section id="stepCamera" class="hidden h-full bg-black relative">
      <video id="cameraVideo" playsinline autoplay muted></video>
      <div class="absolute inset-x-0 top-0 p-4 bg-gradient-to-b from-black/70 to-transparent text-sm text-white/90">
        對準材質後按下拍照
      </div>
      <div class="absolute inset-x-0 bottom-0 p-4 safe-bottom bg-gradient-to-t from-black/80 to-transparent flex items-center justify-center gap-6">
        <button id="btnCameraBack" class="btn btn-sm btn-ghost text-white border border-white/40">取消</button>
        <button id="btnTakePhoto" class="btn btn-circle btn-lg btn-primary" aria-label="拍照"></button>
      </div>
    </section>

    <!-- Step 3: edit + preview -->
    <section id="stepEdit" class="hidden h-full flex flex-col" style="min-height:0">
      <div id="cropContainer" class="flex-1 min-h-0 bg-black/70 flex items-center justify-center overflow-hidden border-b border-base-content/10">
        <canvas id="cropCanvas"></canvas>
      </div>

      <!-- Aspect ratio lock -->
      <div class="shrink-0 flex items-center justify-center gap-2 px-3 py-1.5 bg-base-100/70 border-b border-base-content/10">
        <button id="btnAspectLock" class="btn btn-xs btn-outline gap-1" title="切換裁切比例">
          <svg id="lockIconClosed" xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <svg id="lockIconOpen" xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 018 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
          </svg>
          <span id="lockLabel">1:1</span>
        </button>
        <span class="text-xs text-base-content/40">裁切比例</span>
      </div>

      <div id="previewContainer" class="flex-1 min-h-0 bg-base-100/85 backdrop-blur px-3 py-2 flex flex-col gap-2 border-b border-base-content/10 overflow-hidden">
        <div class="flex items-center gap-2 shrink-0">
          <span class="text-xs uppercase tracking-widest text-base-content/50 flex-1">UV 縮放</span>
          <span id="previewGridVal" class="text-xs font-mono">3</span>
          <span class="text-xs text-base-content/40">tile</span>
        </div>
        <input type="range" id="previewGridSlider" min="1" max="50" value="3" class="range range-accent range-xs shrink-0" />
        <div class="flex-1 min-h-0 flex items-center justify-center">
          <canvas id="previewCanvas" class="rounded shadow max-w-full max-h-full"></canvas>
        </div>
      </div>

      <!-- Advanced parameters dropdown -->
      <details class="collapse shrink-0 bg-base-100/80 border-b border-base-content/10">
        <summary class="collapse-title text-sm font-semibold cursor-pointer py-3 px-4">⚙️ 進階調整</summary>
        <div class="collapse-content px-4 pb-3 pt-0">
          <!-- Seamless parameters -->
          <div class="form-control gap-2 mb-3">
            <label class="label gap-2 cursor-pointer py-0">
              <input type="checkbox" class="toggle toggle-primary toggle-sm" id="enableSeamless" checked />
              <span class="label-text text-xs">啟用四方連續</span>
            </label>
          </div>
          <div id="seamlessControls" class="space-y-2">
            <div class="form-control gap-1">
              <label class="label py-0">
                <span class="label-text text-xs">接縫混合寬度</span>
                <span class="label-text-alt text-xs" id="seamBlendWidthVal">15%</span>
              </label>
              <input type="range" id="seamBlendWidth" min="3" max="40" step="1" value="15" class="range range-primary range-xs" />
            </div>

          </div>
        </div>
      </details>

      <div class="shrink-0 p-3 safe-bottom bg-base-100/95 border-t border-base-content/10 grid grid-cols-3 gap-2">
        <button class="btn btn-ghost" id="btnRetake">重拍</button>
        <button class="btn btn-outline" id="btnPickAnother">重選</button>
        <button class="btn btn-primary" id="btnShowUpload">下一步 →</button>
      </div>
    </section>

    <!-- Step 4: channel preview -->
    <section id="stepPreview" class="hidden h-full flex flex-col overflow-hidden" style="min-height:0">
      <div class="flex-1 overflow-y-auto p-3">
        <p class="text-xs text-base-content/50 uppercase tracking-widest mb-3">確認通道貼圖</p>
        <div class="grid grid-cols-3 gap-2">
          <div class="flex flex-col items-center gap-1">
            <canvas id="previewCh_basecolor" class="rounded w-full aspect-square bg-base-300 object-cover"></canvas>
            <span class="text-xs text-base-content/60">Base Color</span>
          </div>
          <div class="flex flex-col items-center gap-1">
            <canvas id="previewCh_roughness" class="rounded w-full aspect-square bg-base-300"></canvas>
            <span class="text-xs text-base-content/60">Roughness</span>
          </div>
          <div class="flex flex-col items-center gap-1">
            <canvas id="previewCh_ao" class="rounded w-full aspect-square bg-base-300"></canvas>
            <span class="text-xs text-base-content/60">AO</span>
          </div>
          <div class="flex flex-col items-center gap-1">
            <canvas id="previewCh_height" class="rounded w-full aspect-square bg-base-300"></canvas>
            <span class="text-xs text-base-content/60">Height</span>
          </div>
          <div class="flex flex-col items-center gap-1">
            <canvas id="previewCh_normal" class="rounded w-full aspect-square bg-base-300"></canvas>
            <span class="text-xs text-base-content/60">Normal</span>
          </div>
        </div>
      </div>
      <div class="shrink-0 p-3 safe-bottom bg-base-100/95 border-t border-base-content/10 grid grid-cols-2 gap-2">
        <button class="btn btn-ghost" id="btnPreviewBack">← 返回</button>
        <button class="btn btn-primary" id="btnPreviewConfirm">確認上傳</button>
      </div>
    </section>
  </main>

  <!-- Generation loading overlay -->
  <div id="genOverlay" class="hidden fixed inset-0 bg-black/70 z-50 flex flex-col items-center justify-center gap-3">
    <span class="loading loading-spinner loading-lg text-primary"></span>
    <p id="genOverlayLabel" class="text-sm text-white/80">生成通道中...</p>
  </div>

  <!-- Upload bottom sheet -->
  <div id="uploadSheetBackdrop" class="hidden fixed inset-0 bg-black/45 z-40"></div>
  <section id="uploadSheet" class="hidden fixed inset-x-0 bottom-0 z-50 rounded-t-2xl bg-base-100 shadow-2xl border-t border-base-content/10 p-4 safe-bottom">
    <div class="w-12 h-1.5 bg-base-300 rounded-full mx-auto mb-4"></div>
    <h3 class="font-bold text-lg mb-3">命名並上傳</h3>
    <div class="form-control gap-2">
      <label class="label py-0"><span class="label-text">輸出解析度</span></label>
      <select id="uploadResolution" class="select select-bordered w-full">
        <option value="512">512 × 512</option>
        <option value="1024" selected>1024 × 1024</option>
        <option value="2048">2048 × 2048</option>
        <option value="4096">4096 × 4096</option>
      </select>
      <label class="label py-0"><span class="label-text">資料夾名稱</span></label>
      <input type="text" id="uploadName" placeholder="例如: wood_floor_01" class="input input-bordered w-full" maxlength="100" />
      <p class="text-xs text-base-content/40">6 個通道將上傳至同一資料夾</p>
      <label id="sendEmailLabel" class="hidden flex items-center gap-2 text-sm text-base-content/60 cursor-pointer mt-1">
        <input type="checkbox" id="chkSendEmail" class="checkbox checkbox-sm checkbox-primary" />
        <span>📧 上傳完成後寄送材質連結至我的 Email</span>
      </label>
    </div>
    <div class="mt-4 grid grid-cols-2 gap-2">
      <button class="btn btn-ghost" id="btnCancelUpload">取消</button>
      <button class="btn btn-primary" id="btnConfirmUpload">確認上傳</button>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js"></script>
  <script type="module" src="./js/app-mobile.js"></script>
</body>
</html>
