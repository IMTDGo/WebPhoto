<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebPhoto - 電腦版</title>
  <script>
    // Auto-redirect mobile/tablet to mobile version
    const isMobileDevice = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (window.innerWidth < 1024 && window.innerHeight < 1366);
    if (isMobileDevice) {
      window.location.replace('./mobile.html');
    }
  </script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    {"imports": {"three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"}}
  </script>
  <style>
    #threeCanvas { display: block; width: 100%; height: 100%; }
    #cropCanvas  { display: block; touch-action: none; }
    .drop-zone { border: 2px dashed; transition: border-color 0.2s, background 0.2s; }
    .drop-zone.drag-over { border-color: oklch(var(--p)); background: oklch(var(--p)/0.08); }
  </style>
</head>
<body class="bg-base-300 min-h-screen flex flex-col">

  <!-- Navbar -->
  <div class="navbar bg-base-100 shadow px-6 shrink-0">
    <span class="text-xl font-bold text-primary">📷 WebPhoto</span>
    <div class="flex-1"></div>
    <a href="mobile.html" class="btn btn-xs btn-ghost opacity-60">手機版</a>
  </div>

  <div class="flex flex-1 overflow-hidden" style="height: calc(100vh - 64px)">

    <!-- ── Left: Controls ──────────────────────────────────────────── -->
    <div class="w-80 shrink-0 bg-base-100 flex flex-col gap-4 p-5 overflow-y-auto border-r border-base-300 shadow-lg">

      <h2 class="text-lg font-bold">圖片選擇</h2>

      <!-- Drop zone -->
      <div id="dropZone"
        class="drop-zone border-base-content/30 rounded-xl p-6 flex flex-col items-center gap-3 cursor-pointer text-center text-base-content/60 hover:border-primary">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <p class="text-sm">拖放圖片至此<br/>或點擊選擇檔案</p>
        <input type="file" accept="image/*,.tif,.tiff" id="fileInput" class="hidden" />
        <button class="btn btn-outline btn-sm btn-primary"
          onclick="document.getElementById('fileInput').click()">選擇圖片</button>
      </div>

      <!-- Image info -->
      <div id="imageInfo" class="hidden">
        <div class="divider text-xs my-1">圖片資訊</div>
        <div class="text-xs text-base-content/70 flex flex-col gap-1 px-1">
          <div class="flex justify-between"><span>檔名</span><span class="font-mono truncate max-w-40" id="infoName">—</span></div>
          <div class="flex justify-between"><span>尺寸</span><span class="font-mono" id="infoSize">—</span></div>
        </div>
      </div>

      <!-- Crop size -->
      <div id="cropPanel" class="hidden flex flex-col gap-2">
        <div class="divider text-xs my-1">裁切範圍</div>
        <!-- Crop canvas (full-image preview with box) -->
        <div id="cropContainer" class="rounded overflow-hidden bg-black flex items-center justify-center" style="height:180px">
          <canvas id="cropCanvas"></canvas>
        </div>
      </div>

      <!-- Seamless controls -->
      <div id="seamlessPanel" class="hidden flex flex-col gap-3">
        <div class="divider text-xs my-1">四方連續參數</div>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" class="toggle toggle-primary toggle-sm" id="enableSeamless" checked />
          <span class="text-sm">啟用四方連續</span>
        </label>
        <div id="seamlessControls" class="flex flex-col gap-3">
          <div class="form-control gap-1">
            <label class="label py-0">
              <span class="label-text text-xs">混合強度</span>
              <span class="label-text-alt text-xs" id="blendStrengthVal">1.00</span>
            </label>
            <input type="range" id="blendStrength" min="0" max="1" step="0.01" value="1" class="range range-primary range-xs" />
          </div>
          <div class="form-control gap-1">
            <label class="label py-0">
              <span class="label-text text-xs">混合寬度</span>
              <span class="label-text-alt text-xs" id="blendWidthVal">0.15</span>
            </label>
            <input type="range" id="blendWidth" min="0.01" max="0.49" step="0.01" value="0.15" class="range range-primary range-xs" />
          </div>
        </div>
      </div>

      <!-- UV controls -->
      <div id="uvPanel" class="hidden flex flex-col gap-3">
        <div class="divider text-xs my-1">UV 調整（3D預覽）</div>
        <div class="form-control gap-1">
          <label class="label py-0"><span class="label-text text-xs">縮放</span><span class="label-text-alt text-xs" id="uvScaleVal">1.00</span></label>
          <input type="range" id="uvScale" min="0.1" max="50" step="0.1" value="1" class="range range-secondary range-xs" />
        </div>
        <div class="form-control gap-1">
          <label class="label py-0"><span class="label-text text-xs">偏移 X</span><span class="label-text-alt text-xs" id="uvOffXVal">0.00</span></label>
          <input type="range" id="uvOffX" min="-1" max="1" step="0.01" value="0" class="range range-accent range-xs" />
        </div>
        <div class="form-control gap-1">
          <label class="label py-0"><span class="label-text text-xs">偏移 Y</span><span class="label-text-alt text-xs" id="uvOffYVal">0.00</span></label>
          <input type="range" id="uvOffY" min="-1" max="1" step="0.01" value="0" class="range range-accent range-xs" />
        </div>
      </div>

      <!-- Upload -->
      <div id="uploadPanel" class="hidden flex flex-col gap-2 mt-auto pt-3 border-t border-base-300">
        <div class="form-control gap-1">
          <label class="label py-0"><span class="label-text text-xs">上傳名稱</span></label>
          <input type="text" id="uploadName" placeholder="例如: wood_floor_01"
            class="input input-bordered input-sm w-full" maxlength="100" />
        </div>
        <button class="btn btn-primary btn-sm gap-2" id="btnUpload">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
          </svg>
          上傳圖片
        </button>
      </div>
    </div>

    <!-- ── Right: Three.js viewer ────────────────────────────────────── -->
    <div class="flex-1 relative bg-base-300 overflow-hidden">
      <div id="emptyState" class="absolute inset-0 flex items-center justify-center text-base-content/20 select-none pointer-events-none">
        <div class="text-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 mx-auto mb-3 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <p>選擇圖片後將在此顯示 3D 四方連續預覽</p>
        </div>
      </div>
      <canvas id="threeCanvas" class="hidden"></canvas>
    </div>
  </div>

  <!-- Channel preview modal -->
  <dialog id="previewModal" class="modal">
    <div class="modal-box max-w-2xl w-full">
      <h3 class="font-bold text-lg mb-1">確認通道貼圖</h3>
      <p class="text-xs text-base-content/50 mb-4">確認各通道正確後再上傳</p>
      <div class="grid grid-cols-3 gap-3 mb-5">
        <div class="flex flex-col items-center gap-1">
          <canvas id="modalCh_basecolor" class="rounded w-full aspect-square bg-base-300"></canvas>
          <span class="text-xs text-base-content/60">Base Color</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <canvas id="modalCh_roughness" class="rounded w-full aspect-square bg-base-300"></canvas>
          <span class="text-xs text-base-content/60">Roughness</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <canvas id="modalCh_ao" class="rounded w-full aspect-square bg-base-300"></canvas>
          <span class="text-xs text-base-content/60">AO</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <canvas id="modalCh_height" class="rounded w-full aspect-square bg-base-300"></canvas>
          <span class="text-xs text-base-content/60">Height</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <canvas id="modalCh_normal" class="rounded w-full aspect-square bg-base-300"></canvas>
          <span class="text-xs text-base-content/60">Normal</span>
        </div>
      </div>
      <div class="modal-action">
        <button class="btn btn-ghost" id="btnPreviewModalClose">取消</button>
        <button class="btn btn-primary" id="btnPreviewModalConfirm">確認上傳</button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

  <script type="module" src="./js/app-desktop.js"></script>
</body>
</html>
