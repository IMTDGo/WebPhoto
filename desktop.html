<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebPhoto - 電腦版</title>
  <script>
    // Auth guard — must be logged in
    if (!sessionStorage.getItem('wp_auth') && !localStorage.getItem('wp_auth')) {
      window.location.replace('./login.html');
    }
    // Auto-redirect mobile/tablet to mobile version
    const isMobileDevice = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (window.innerWidth < 1024 && window.innerHeight < 1366);
    if (isMobileDevice) {
      window.location.replace('./mobile.html');
    }
  </script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #cropCanvas  { display: block; touch-action: none; }
    .drop-zone { border: 2px dashed; transition: border-color 0.2s, background 0.2s; }
    .drop-zone.drag-over { border-color: oklch(var(--p)); background: oklch(var(--p)/0.08); }
    /* panel title bar */
    .panel-hd {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.35rem 0.75rem;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      color: oklch(var(--bc)/0.4);
      background: oklch(var(--b2));
      border-bottom: 1px solid oklch(var(--b3)/0.6);
      user-select: none; flex-shrink: 0;
    }
    .panel-hd::before {
      content: ''; width: 2px; height: 11px; border-radius: 1px;
      background: oklch(var(--p)/0.65); flex-shrink: 0;
    }
    .panel-hd .panel-hd-extra { margin-left: auto; }
  </style>
</head>
<body class="bg-base-300 h-screen overflow-hidden flex flex-col">

  <!-- Navbar -->
  <div class="navbar bg-base-100 shadow px-6 shrink-0">
    <span class="text-xl font-bold text-primary">📷 WebPhoto</span>
    <div class="flex-1"></div>
    <div class="flex items-center gap-3">
      <span id="navUsername" class="text-sm text-base-content/70 hidden"></span>
      <button id="btnLogout" class="btn btn-xs btn-ghost text-error hidden">登出</button>
      <a href="mobile.html" class="btn btn-xs btn-ghost opacity-60">手機版</a>
    </div>
  </div>
  <script>
    (function () {
      const raw = sessionStorage.getItem('wp_user') || localStorage.getItem('wp_user');
      if (raw) {
        try {
          const user = JSON.parse(raw);
          const el = document.getElementById('navUsername');
          el.textContent = '👤 ' + (user.name || user.id);
          el.classList.remove('hidden');
          document.getElementById('btnLogout').classList.remove('hidden');
        } catch (e) {}
      }
      document.getElementById('btnLogout').addEventListener('click', () => {
        ['wp_auth', 'wp_token', 'wp_sessionId', 'wp_user'].forEach(k => {
          localStorage.removeItem(k);
          sessionStorage.removeItem(k);
        });
        window.location.replace('./login.html');
      });
    })();
  </script>

  <div class="flex flex-1 overflow-hidden min-h-0">

    <!-- ── Left: Controls ──────────────────────────────────────────── -->
    <div class="w-80 shrink-0 bg-base-100 flex flex-col gap-4 p-5 overflow-y-auto border-r border-base-300 shadow-lg">

      <!-- ── BOM 選擇 ── -->
      <div class="flex flex-col gap-3">
        <h2 class="text-lg font-bold">BOM 選擇</h2>

        <!-- Project dropdown -->
        <div class="form-control gap-1">
          <label class="label py-0"><span class="label-text text-xs">專案</span></label>
          <select id="deskProjectSelect" class="select select-bordered select-sm w-full">
            <option value="">— 載入中 —</option>
          </select>
        </div>

        <!-- BOM dropdown (populated from bom-list API) -->
        <div id="deskBomSelectWrap" class="form-control gap-1" style="display:none">
          <label class="label py-0"><span class="label-text text-xs">BOM</span></label>
          <select id="deskBomSelect" class="select select-bordered select-sm w-full">
            <option value="">— 選擇 BOM —</option>
          </select>
        </div>

        <!-- BOM manual input (fallback when bom-list returns 404) -->
        <div id="deskBomInputWrap" class="form-control gap-1" style="display:none">
          <label class="label py-0"><span class="label-text text-xs">BOM 編號（手動輸入）</span></label>
          <div class="flex gap-2">
            <input id="deskBomInput" type="text" placeholder="bom_id"
              class="input input-bordered input-sm flex-1" autocomplete="off" />
            <button id="deskBomConfirm" class="btn btn-sm btn-primary">確認</button>
          </div>
          <div id="deskBomError" class="hidden text-xs text-error mt-1"></div>
        </div>

        <!-- Category accordion (shown after BOM confirmed) -->
        <div id="deskCategoryWrap" class="flex flex-col gap-1" style="display:none">
          <label class="label py-0"><span class="label-text text-xs">選擇材質</span></label>
          <div id="deskCategoryList"
            class="overflow-y-auto"
            style="max-height:22rem;-webkit-overflow-scrolling:touch"></div>
        </div>

        <!-- Selected material chip -->
        <div id="deskMaterialChip" class="rounded-lg bg-primary/10 border border-primary/20 px-3 py-2 text-xs flex items-center gap-2" style="display:none">
          <span class="text-primary/60">已選：</span>
          <span id="deskMaterialLabel" class="font-semibold text-primary flex-1 truncate"></span>
          <button id="deskClearMaterial" class="text-base-content/30 hover:text-error transition-colors">✕</button>
        </div>
      </div>

      <div class="divider my-0"></div>

      <!-- Image info -->
      <div id="imageInfo" class="hidden">
        <div class="divider text-xs my-1">圖片資訊</div>
        <div class="text-xs text-base-content/70 flex flex-col gap-1 px-1">
          <div class="flex justify-between"><span>檔名</span><span class="font-mono truncate max-w-40" id="infoName">—</span></div>
          <div class="flex justify-between"><span>尺寸</span><span class="font-mono" id="infoSize">—</span></div>
        </div>
      </div>

      <!-- UV scale + preview options (shown after image load) -->
      <div id="cropPanel" class="hidden flex flex-col gap-3">
        <div class="divider text-xs my-0">預覽設定</div>
        <div class="form-control gap-1.5">
          <div class="flex items-center justify-between">
            <span class="label-text text-xs">UV 縮放（格數）</span>
            <span id="uvScaleVal" class="badge badge-sm badge-neutral font-mono min-w-[2rem] justify-center">3</span>
          </div>
          <input type="range" id="uvScale" min="1" max="16" step="1" value="3"
            class="range range-secondary range-xs w-full" />
          <div class="flex justify-between text-xs text-base-content/25 px-0.5">
            <span>1</span><span>8</span><span>16</span>
          </div>
        </div>
      </div>

      <!-- Seamless controls -->
      <div id="seamlessPanel" class="hidden flex flex-col gap-3" style="display:none!important">
        <div class="divider text-xs my-1">四方連續參數</div>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" class="toggle toggle-primary toggle-sm" id="enableSeamless" checked />
          <span class="text-sm">啟用四方連續</span>
        </label>
        <div id="seamlessControls" class="flex flex-col gap-3">
          <div class="form-control gap-1">
            <label class="label py-0">
              <span class="label-text text-xs">接縫混合寬度</span>
              <span class="label-text-alt text-xs" id="seamBlendWidthVal">15%</span>
            </label>
            <input type="range" id="seamBlendWidth" min="3" max="40" step="1" value="15" class="range range-primary range-xs" />
          </div>
        </div>
      </div>

      <!-- Upload -->
      <div id="uploadPanel" class="hidden flex flex-col gap-2 mt-auto pt-3 border-t border-base-300">
        <div class="form-control gap-1">
          <label class="label py-0"><span class="label-text text-xs">輸出解析度</span></label>
          <select id="uploadResolution" class="select select-bordered select-sm w-full">
            <option value="512">512 × 512</option>
            <option value="1024" selected>1024 × 1024</option>
            <option value="2048">2048 × 2048</option>
            <option value="4096">4096 × 4096</option>
          </select>
        </div>
        <div class="form-control gap-1">
          <label class="label py-0"><span class="label-text text-xs">上傳名稱</span></label>
          <input type="text" id="uploadName" placeholder="例如: wood_floor_01"
            class="input input-bordered input-sm w-full" maxlength="100" />
        </div>
        <button class="btn btn-primary btn-sm gap-2" id="btnUpload">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
          </svg>
          上傳圖片
        </button>
      </div>
    </div>

      <!-- ── Right: 3-panel view ────────────────────────────────────────── -->
    <div class="flex-1 flex flex-col overflow-hidden" style="min-height:0">

      <!-- Top row: original image / drop zone (left) | crop editor (right) -->
      <div class="flex-1 flex min-h-0 border-b border-base-300">

        <!-- Top-left: drop zone + original image -->
        <div class="flex-1 flex flex-col min-w-0 border-r border-base-300">
          <div class="panel-hd">
            原始圖片
            <div class="panel-hd-extra">
              <label class="btn btn-xs btn-outline btn-primary cursor-pointer">
                選擇圖片
                <input type="file" accept="image/*,.tif,.tiff" id="fileInput" class="hidden" />
              </label>
            </div>
          </div>
          <div id="dropZone" class="drop-zone border-base-content/15 flex-1 flex items-center justify-center bg-base-300 overflow-hidden relative hover:border-primary/40">
            <label for="fileInput" id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-base-content/20 gap-3 cursor-pointer select-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              <p class="text-sm">拖放圖片至此，或點擊選擇</p>
            </label>
            <img id="originalImg" class="hidden max-w-full max-h-full object-contain relative z-10" alt="原始圖片" />
          </div>
        </div>

        <!-- Top-right: crop editor -->
        <div id="rightCropPanel" class="flex-1 flex flex-col min-w-0" style="display:none">
          <div class="panel-hd">
            裁切範圍
            <div class="panel-hd-extra">
              <button id="btnAspectLock" class="btn btn-xs btn-outline gap-1" title="切換裁切比例（1:1 / 自由）">
                <svg id="lockIconClosed" xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <svg id="lockIconOpen" xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 018 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
                </svg>
                <span id="lockLabel">1:1</span>
              </button>
            </div>
          </div>
          <div class="flex-1 bg-black flex items-center justify-center overflow-hidden" id="cropContainer">
            <canvas id="cropCanvas"></canvas>
          </div>
        </div>

      </div>

      <!-- Bottom row: tiled preview -->
      <div id="previewSection" class="flex-1 flex flex-col min-h-0" style="display:none">
        <div class="panel-hd">預覽</div>
        <div class="flex-1 flex items-center justify-center bg-base-300 overflow-hidden">
          <canvas id="previewCanvas" class="max-w-full max-h-full"></canvas>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js"></script>
  <script src="./config.js"></script>
  <script type="module" src="./js/app-desktop.js"></script>
</body>
</html>
